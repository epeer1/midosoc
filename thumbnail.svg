<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <radialGradient id="glow" cx="50%" cy="45%" r="50%">
      <stop offset="0%" style="stop-color:#064e3b;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#050505;stop-opacity:1"/>
    </radialGradient>
    <radialGradient id="shieldGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:0"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="800" fill="#050505"/>
  <rect width="1200" height="800" fill="url(#glow)"/>
  
  <!-- Grid lines -->
  <g stroke="#1a1a1a" stroke-width="0.5" opacity="0.5">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="0" y1="600" x2="1200" y2="600"/>
    <line x1="0" y1="700" x2="1200" y2="700"/>
    <line x1="200" y1="0" x2="200" y2="800"/>
    <line x1="400" y1="0" x2="400" y2="800"/>
    <line x1="600" y1="0" x2="600" y2="800"/>
    <line x1="800" y1="0" x2="800" y2="800"/>
    <line x1="1000" y1="0" x2="1000" y2="800"/>
  </g>

  <!-- Shield glow -->
  <circle cx="600" cy="310" r="140" fill="url(#shieldGlow)"/>
  
  <!-- Shield icon -->
  <g transform="translate(600, 300)" fill="none" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M0,-60 C0,-60 -50,-45 -50,-10 C-50,30 -25,55 0,68 C25,55 50,30 50,-10 C50,-45 0,-60 0,-60Z" opacity="0.8"/>
    <path d="M-12,2 L-4,10 L14,-8" stroke-width="3.5"/>
  </g>
  
  <!-- Orbiting ring -->
  <ellipse cx="600" cy="310" rx="100" ry="100" fill="none" stroke="#10b981" stroke-width="0.8" opacity="0.3" stroke-dasharray="6 4"/>
  
  <!-- Red threat dot -->
  <circle cx="524" cy="248" r="6" fill="#ef4444" opacity="0.9"/>
  <circle cx="524" cy="248" r="10" fill="#ef4444" opacity="0.2"/>
  
  <!-- Title -->
  <text x="600" y="440" text-anchor="middle" fill="white" font-family="ui-monospace, Consolas, monospace" font-size="56" font-weight="bold" letter-spacing="16">MIDOSOC</text>
  
  <!-- Subtitle -->
  <text x="600" y="480" text-anchor="middle" fill="#6b7280" font-family="ui-monospace, Consolas, monospace" font-size="13" letter-spacing="6" text-transform="uppercase">ZERO-TRUST AI AGENT COMMAND CENTER</text>
  
  <!-- Divider -->
  <line x1="440" y1="510" x2="760" y2="510" stroke="#1f2937" stroke-width="1"/>
  
  <!-- Description -->
  <text x="600" y="548" text-anchor="middle" fill="#9ca3af" font-family="system-ui, sans-serif" font-size="17">Human-in-the-loop authorization for autonomous AI agents</text>
  
  <!-- Auth0 badge -->
  <rect x="488" y="580" width="224" height="34" rx="17" fill="none" stroke="#374151" stroke-width="1"/>
  <text x="600" y="602" text-anchor="middle" fill="#6b7280" font-family="system-ui, sans-serif" font-size="12" letter-spacing="3">POWERED BY AUTH0 TOKEN VAULT</text>

  <!-- Flow arrows at bottom -->
  <g transform="translate(600, 700)" fill="#374151" font-family="ui-monospace, Consolas, monospace" font-size="11" text-anchor="middle">
    <text x="-340" y="0" fill="#10b981">AI Agent</text>
    <text x="-220" y="0" fill="#4b5563">→</text>
    <text x="-120" y="0" fill="#f59e0b">Gateway</text>
    <text x="-20" y="0" fill="#4b5563">→</text>
    <text x="80" y="0" fill="#ef4444">Suspended</text>
    <text x="180" y="0" fill="#4b5563">→</text>
    <text x="270" y="0" fill="#10b981">Human ✓</text>
    <text x="370" y="0" fill="#4b5563">→</text>
    <text x="450" y="0" fill="#3b82f6">Vault Token</text>
  </g>

  <!-- Status indicator top-left -->
  <circle cx="40" cy="30" r="5" fill="#10b981"/>
  <text x="54" y="34" fill="#6b7280" font-family="ui-monospace, Consolas, monospace" font-size="10" letter-spacing="2">SYSTEM ACTIVE</text>

  <!-- Border -->
  <rect x="1" y="1" width="1198" height="798" fill="none" stroke="#1f2937" stroke-width="1" rx="4"/>
</svg>